  <text x="30" y="225" class="phase-sub">Weeks 2–4 · #13–16 done</text>
  <rect x="160" y="195" width="690" height="28" fill="#2d5a8e" rx="5"/>
  <text x="172" y="214" class="bar-text">Backend, Frontend &amp; Interactions</text>
  <!-- row 1 tickets -->
  <rect x="160" y="228" width="100" height="18" fill="#0c3a6b" rx="3"/>
  <text x="210" y="241" class="ticket must-text" text-anchor="middle">#13 Post a comment ✓</text>
  <rect x="266" y="228" width="92" height="18" fill="#0a3d2e" rx="3"/>
  <text x="312" y="241" class="ticket should-text" text-anchor="middle">#14 Like an album ✓</text>
  <rect x="364" y="228" width="96" height="18" fill="#0a3d2e" rx="3"/>
  <text x="412" y="241" class="ticket should-text" text-anchor="middle">#15 Dislike an album ✓</text>
  <rect x="466" y="228" width="104" height="18" fill="#0a3d2e" rx="3"/>
  <text x="518" y="241" class="ticket should-text" text-anchor="middle">#16 Reply to comment ✓</text>
  <rect x="576" y="228" width="112" height="18" fill="#0c3a6b" rx="3"/>
  <text x="632" y="241" class="ticket must-text" text-anchor="middle">Album &amp; Genre models ✓</text>
  <!-- row 2 tickets -->
  <rect x="160" y="251" width="118" height="18" fill="#0c3a6b" rx="3"/>
  <text x="219" y="264" class="ticket must-text" text-anchor="middle">fetch_albums command ✓</text>
  <rect x="284" y="251" width="112" height="18" fill="#0c3a6b" rx="3"/>
  <text x="340" y="264" class="ticket must-text" text-anchor="middle">User auth (allauth) ✓</text>
  <rect x="402" y="251" width="110" height="18" fill="#0c3a6b" rx="3"/>
  <text x="457" y="264" class="ticket must-text" text-anchor="middle">Album detail page ✓</text>
  <rect x="518" y="251" width="82" height="18" fill="#0c3a6b" rx="3"/>
  <text x="559" y="264" class="ticket must-text" text-anchor="middle">Genre pages ✓</text>
  <rect x="606" y="251" width="86" height="18" fill="#0a3d2e" rx="3"/>
  <text x="649" y="264" class="ticket should-text" text-anchor="middle">Search &amp; sort ✓</text>

  <!-- connector -->
  <line x1="90" y1="275" x2="90" y2="295" class="connector"/>

