  <text x="30" y="315" class="phase-label">Testing Phase</text>
  <text x="30" y="330" class="phase-sub">Week 5</text>
  <rect x="160" y="300" width="690" height="28" fill="#2d5a8e" rx="5"/>
  <text x="172" y="319" class="bar-text">Validation &amp; Bug Fixes</text>
