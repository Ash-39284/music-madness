<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620" viewBox="0 0 900 620">
  <style>
    .bg { fill: #1a1a2e; }
    .card { fill: #16213e; rx: 8; }
    .bar { fill: #2d5a8e; }
    .bar-wont { fill: #4a4a4a; }
    .phase-label { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #e0e0e0; }
    .phase-sub { font-family: Arial, sans-serif; font-size: 11px; fill: #a0a0b0; }
    .bar-text { font-family: Arial, sans-serif; font-size: 12px; fill: #b8d4f0; font-weight: bold; }
    .ticket { font-family: Arial, sans-serif; font-size: 10px; }
    .must-bg { fill: #0c3a6b; }
    .must-text { fill: #7ab8f5; }
    .should-bg { fill: #0a3d2e; }
    .should-text { fill: #5dd4a8; }
    .could-bg { fill: #5a3200; }
    .could-text { fill: #f0a830; }
    .wont-bg { fill: #3a3a3a; }
    .wont-text { fill: #b0b0b0; }
    .legend-text { font-family: Arial, sans-serif; font-size: 11px; fill: #c0c0c0; }
    .title-text { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #ffffff; }
    .stat-num { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; }
    .stat-label { font-family: Arial, sans-serif; font-size: 10px; fill: #a0a0b0; }
    .connector { stroke: #3a3a5c; stroke-width: 1; }
  </style>

  <!-- Background -->
  <rect width="900" height="620" fill="#1a1a2e" rx="12"/>

  <!-- Title -->
  <text x="30" y="35" class="title-text">Music Madness — Agile Development Timeline</text>

  <!-- Legend -->
  <rect x="30" y="50" width="12" height="12" fill="#2d5a8e" rx="2"/>
  <text x="46" y="61" class="legend-text">Must Have</text>
  <rect x="130" y="50" width="12" height="12" fill="#0a3d2e" rx="2"/>
  <text x="146" y="61" class="legend-text">Should Have</text>
  <rect x="240" y="50" width="12" height="12" fill="#5a3200" rx="2"/>
  <text x="256" y="61" class="legend-text">Could Have</text>
  <rect x="340" y="50" width="12" height="12" fill="#3a3a3a" rx="2"/>
  <text x="356" y="61" class="legend-text">Won't Have</text>

  <!-- Stat boxes -->
  <rect x="600" y="40" width="90" height="50" fill="#16213e" rx="6"/>
  <text x="645" y="62" class="stat-num" fill="#5dd4a8" text-anchor="middle">15</text>
  <text x="645" y="78" class="stat-label" text-anchor="middle">Done</text>

  <rect x="700" y="40" width="90" height="50" fill="#16213e" rx="6"/>
  <text x="745" y="62" class="stat-num" fill="#f0a830" text-anchor="middle">0</text>
  <text x="745" y="78" class="stat-label" text-anchor="middle">In Progress</text>

  <rect x="800" y="40" width="90" height="50" fill="#16213e" rx="6"/>
  <text x="845" y="62" class="stat-num" fill="#b0b0b0" text-anchor="middle">6</text>
  <text x="845" y="78" class="stat-label" text-anchor="middle">Won't Have</text>

  <!-- Divider -->
  <line x1="30" y1="100" x2="870" y2="100" stroke="#2a2a4a" stroke-width="1"/>

  <!-- ── DESIGN PHASE ── -->
  <text x="30" y="130" class="phase-label">Design Phase</text>
  <text x="30" y="145" class="phase-sub">Week 1 · #1 done</text>
  <rect x="160" y="115" width="690" height="28" fill="#2d5a8e" rx="5"/>
  <text x="172" y="134" class="bar-text">Planning &amp; Design</text>
  <!-- tickets -->
  <rect x="160" y="148" width="88" height="18" fill="#0c3a6b" rx="3"/>
  <text x="204" y="161" class="ticket must-text" text-anchor="middle">#1 Frontend design ✓</text>
  <rect x="254" y="148" width="72" height="18" fill="#0c3a6b" rx="3"/>
  <text x="290" y="161" class="ticket must-text" text-anchor="middle">ERD diagram ✓</text>
  <rect x="332" y="148" width="68" height="18" fill="#0c3a6b" rx="3"/>
  <text x="366" y="161" class="ticket must-text" text-anchor="middle">Wireframes ✓</text>
  <rect x="406" y="148" width="94" height="18" fill="#0c3a6b" rx="3"/>
  <text x="453" y="161" class="ticket must-text" text-anchor="middle">GitHub board setup ✓</text>
  <rect x="506" y="148" width="100" height="18" fill="#0c3a6b" rx="3"/>
  <text x="556" y="161" class="ticket must-text" text-anchor="middle">PostgreSQL setup ✓</text>

  <!-- connector -->
  <line x1="90" y1="170" x2="90" y2="190" class="connector"/>

