{% extends "base.html" %}

{% block title %}Password Reset Complete | Music Madness{% endblock %}

{% block content %}

<section class="container py-5">
  <div class="auth-card mx-auto text-center">

    <h1 class="auth-card__title">Password updated</h1>

    <p class="auth-card__sub">
      Your password has been successfully reset.
    </p>

    <p class="auth-card__text mt-3">
      You can now log in with your new password.
    </p>

    <a href="{% url 'account_login' %}" class="btn btn-primary mt-4">
      Go to Login
    </a>

  </div>
</section>

{% endblock %}
