{% extends "base.html" %}

{% block title %}Email Sent | Music Madness{% endblock %}

{% block content %}

<section class="container py-5">
  <div class="auth-card mx-auto text-center">

    <h1 class="auth-card__title">Check your email</h1>

    <p class="auth-card__sub">
      If an account exists with that email, we’ve sent a password reset link.
    </p>

    <p class="auth-card__text mt-3">
      Please check your inbox (and spam folder just in case).
    </p>

    <a href="{% url 'account_login' %}" class="btn btn-primary mt-4">
      Back to Login
    </a>

  </div>
</section>

{% endblock %}
