  <rect x="160" y="333" width="88" height="18" fill="#0c3a6b" rx="3"/>
  <text x="204" y="346" class="ticket must-text" text-anchor="middle">HTML validation ✓</text>
  <rect x="254" y="333" width="80" height="18" fill="#0c3a6b" rx="3"/>
  <text x="294" y="346" class="ticket must-text" text-anchor="middle">CSS validation ✓</text>
  <rect x="340" y="333" width="92" height="18" fill="#0c3a6b" rx="3"/>
  <text x="386" y="346" class="ticket must-text" text-anchor="middle">Python linting ✓</text>
  <rect x="438" y="333" width="92" height="18" fill="#0c3a6b" rx="3"/>
  <text x="484" y="346" class="ticket must-text" text-anchor="middle">Manual testing ✓</text>
  <rect x="536" y="333" width="108" height="18" fill="#0c3a6b" rx="3"/>
  <text x="590" y="346" class="ticket must-text" text-anchor="middle">77 automated tests ✓</text>
  <rect x="650" y="333" width="100" height="18" fill="#0a3d2e" rx="3"/>
  <text x="700" y="346" class="ticket should-text" text-anchor="middle">JSHint + Jest ✓</text>

  <!-- connector -->
  <line x1="90" y1="357" x2="90" y2="377" class="connector"/>

  <!-- ── DEPLOYMENT PHASE ── -->
  <text x="30" y="397" class="phase-label">Deployment Phase</text>
  <text x="30" y="412" class="phase-sub">Week 6</text>
  <rect x="160" y="382" width="690" height="28" fill="#2d5a8e" rx="5"/>
  <text x="172" y="401" class="bar-text">Heroku &amp; README</text>
  <!-- tickets -->
  <rect x="160" y="415" width="102" height="18" fill="#0c3a6b" rx="3"/>
  <text x="211" y="428" class="ticket must-text" text-anchor="middle">Heroku app setup ✓</text>
  <rect x="268" y="415" width="106" height="18" fill="#0c3a6b" rx="3"/>
  <text x="321" y="428" class="ticket must-text" text-anchor="middle">Config vars &amp; env ✓</text>
  <rect x="380" y="415" width="118" height="18" fill="#0c3a6b" rx="3"/>
  <text x="439" y="428" class="ticket must-text" text-anchor="middle">Static files (Whitenoise) ✓</text>
  <rect x="504" y="415" width="120" height="18" fill="#0c3a6b" rx="3"/>
  <text x="564" y="428" class="ticket must-text" text-anchor="middle">Production deployment ✓</text>
  <rect x="630" y="415" width="110" height="18" fill="#0c3a6b" rx="3"/>
  <text x="685" y="428" class="ticket must-text" text-anchor="middle">README completion ✓</text>

  <!-- connector -->
  <line x1="90" y1="438" x2="90" y2="458" class="connector"/>

  <!-- ── WON'T HAVE ── -->
  <text x="30" y="478" class="phase-label">Won't Have Backlog</text>
  <text x="30" y="493" class="phase-sub">Issues #19–#24</text>
  <rect x="160" y="463" width="690" height="28" fill="#4a4a4a" rx="5"/>
  <text x="172" y="482" class="bar-text" fill="#c0c0c0">Out of Scope — Future Versions</text>
  <!-- tickets -->
  <rect x="160" y="496" width="82" height="18" fill="#3a3a3a" rx="3"/>
  <text x="201" y="509" class="ticket wont-text" text-anchor="middle">#19 User profiles</text>
  <rect x="248" y="496" width="96" height="18" fill="#3a3a3a" rx="3"/>
  <text x="296" y="509" class="ticket wont-text" text-anchor="middle">#20 Following users</text>
  <rect x="350" y="496" width="110" height="18" fill="#3a3a3a" rx="3"/>
  <text x="405" y="509" class="ticket wont-text" text-anchor="middle">#21 Star ratings</text>
  <rect x="466" y="496" width="104" height="18" fill="#3a3a3a" rx="3"/>
  <text x="518" y="509" class="ticket wont-text" text-anchor="middle">#22 Playlist creation</text>
  <rect x="576" y="496" width="106" height="18" fill="#3a3a3a" rx="3"/>
  <text x="629" y="509" class="ticket wont-text" text-anchor="middle">#23 Music playback</text>
  <rect x="688" y="496" width="90" height="18" fill="#3a3a3a" rx="3"/>
  <text x="733" y="509" class="ticket wont-text" text-anchor="middle">#24 Vinyl wishlist</text>

  <!-- Bottom border -->
  <line x1="30" y1="530" x2="870" y2="530" stroke="#2a2a4a" stroke-width="1"/>
  <text x="30" y="550" class="legend-text">Music Madness · GitHub Projects Board · 2026</text>
</svg>
